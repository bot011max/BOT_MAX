name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and push API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deployments/Dockerfile.api
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/medical-bot-api:${{ steps.get_version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/medical-bot-api:latest

    - name: Build and push Telegram bot
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deployments/Dockerfile.telegram
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/medical-bot-telegram:${{ steps.get_version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/medical-bot-telegram:latest

    - name: Deploy to production
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /app/medical-bot
          docker-compose pull
          docker-compose up -d --remove-orphans
          docker system prune -f
