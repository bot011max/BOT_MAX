version: '3.8'

services:
  # ==========================================
  # POSTGRESQL - БАЗА ДАННЫХ
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: medical-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: medical_bot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - ./secrets:/run/secrets:ro
    networks:
      - internal
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # REDIS - КЭШ И RATE LIMITING
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: medical-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
      - ./secrets:/run/secrets:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # API СЕРВЕР
  # ==========================================
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.api
    container_name: medical-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: medical_bot
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MASTER_KEY: ${MASTER_KEY}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./logs:/var/log
      - ./secrets:/secrets:ro
    networks:
      - internal
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # TELEGRAM БОТ
  # ==========================================
  telegram-bot:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.telegram
    container_name: medical-telegram
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: medical_bot
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      WEBHOOK_URL: ${WEBHOOK_URL}
    volumes:
      - ./logs:/var/log
      - ./secrets:/secrets:ro
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # NGINX - ОБРАТНЫЙ ПРОКСИ
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api
      - telegram-bot
    networks:
      - internal
      - web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # PROMETHEUS - МОНИТОРИНГ
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: medical-prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # GRAFANA - ВИЗУАЛИЗАЦИЯ
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: medical-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

# ==========================================
# СЕТИ
# ==========================================
networks:
  internal:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
  web:
    driver: bridge

# ==========================================
# ТОМА
# ==========================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

# ==========================================
# СЕКРЕТЫ
# ==========================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
